name: HMS Ultimate CI/CD Pipeline (Fixed)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - cloud-dev
          - cloud-test
          - cloud-prod

env:
  PROJECT_NAME: HospitalManagementSystem
  BUCKET_NAME: claudedeployapp
  NODE_VERSION: 20

  LEAD_EMAIL: ${{ secrets.LEAD_EMAIL }}
  LEAD_NAME: ${{ secrets.LEAD_NAME }}

  MANAGER_EMAIL: ${{ secrets.MANAGER_EMAIL }}
  MANAGER_NAME: ${{ secrets.MANAGER_NAME }}

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:

# -------------------------------------------------------
# 1️⃣ SET ENVIRONMENT
# -------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.set.outputs.branch }}

    steps:
      - id: set
        run: |
          ENV="${{ github.event.inputs.environment }}"

          if [ "$ENV" == "cloud-dev" ]; then
            echo "branch=dev" >> $GITHUB_OUTPUT
          elif [ "$ENV" == "cloud-test" ]; then
            echo "branch=test" >> $GITHUB_OUTPUT
          else
            echo "branch=main" >> $GITHUB_OUTPUT
          fi

# -------------------------------------------------------
# 2️⃣ BUILD + ANALYSIS
# -------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: setup

    outputs:
      zip_name: ${{ steps.zip.outputs.zip_name }}
      commit_message: ${{ steps.commit.outputs.msg }}
      changed_files: ${{ steps.diff.outputs.files }}
      change_stats: ${{ steps.stats.outputs.stats }}
      resolved_issues: ${{ steps.issues.outputs.issues }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch }}
          fetch-depth: 5

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install

      - run: npm run build -- --configuration production

      - id: time
        run: echo "ts=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
        
        
      - id: version  #(Generate Auto Version (Run + Date))
        run: |
          VERSION="v1.0.${{ github.run_number }}_$(date +'%Y%m%d')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - id: commit
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - id: diff
        run: |
          echo "files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only HEAD~1 HEAD >> $GITHUB_OUTPUT || true
          echo "EOF" >> $GITHUB_OUTPUT

      - id: stats
        run: |
          echo "stats<<EOF" >> $GITHUB_OUTPUT
          git diff --stat HEAD~1 HEAD >> $GITHUB_OUTPUT || true
          echo "EOF" >> $GITHUB_OUTPUT

      - id: issues
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const commits = execSync("git log -10 --pretty=%B").toString();
            const matches = [...commits.matchAll(/#(\d+)/g)];
            const unique = [...new Set(matches.map(m => m[1]))];

            if (unique.length === 0) {
              core.setOutput("issues", "No linked issues found.");
              return;
            }

            let out = "Resolved Issues:\n\n";
            for (const i of unique) {
              try {
                const issue = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parseInt(i)
                });
                out += `• #${i} - ${issue.data.title}\n`;
              } catch {
                out += `• #${i}\n`;
              }
            }
            core.setOutput("issues", out);

      - id: zip
        run: |
          ENV=${{ github.event.inputs.environment }}
          TS=${{ steps.time.outputs.ts }}
          VERSION=${{ steps.version.outputs.version }}

          NAME="build_${ENV}_${TS}_v${VERSION}.zip"
          echo "zip_name=$NAME" >> $GITHUB_OUTPUT

          cd dist
          zip -r ../$NAME .
          cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.zip_name }}
          path: ${{ steps.zip.outputs.zip_name }}

# -------------------------------------------------------
# 3️⃣ LEAD EMAIL (TEST + PROD)
# -------------------------------------------------------
  lead-mail:
    if: github.event.inputs.environment != 'cloud-dev'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}

          subject: "Lead Approval Required"

          to: ${{ env.LEAD_EMAIL }}
          cc: ${{ secrets.TEAM_CC }}
          from: ${{ secrets.SMTP_USERNAME }}

          html_body: |
            <h3>Build Ready for Approval</h3>
            <p><b>Commit:</b> ${{ needs.build.outputs.commit_message }}</p>
            <pre>${{ needs.build.outputs.resolved_issues }}</pre>

# -------------------------------------------------------
# 4️⃣ LEAD APPROVAL
# -------------------------------------------------------
  lead-approval:
    if: github.event.inputs.environment != 'cloud-dev'
    needs: lead-mail
    runs-on: ubuntu-latest

    environment:
      name: lead-approval

    steps:
      - run: echo "Waiting for Lead Approval"

# -------------------------------------------------------
# 5️⃣ MANAGER EMAIL (PROD ONLY)
# -------------------------------------------------------
  manager-mail:
    if: github.event.inputs.environment == 'cloud-prod'
    needs: [lead-approval, build]
    runs-on: ubuntu-latest

    steps:
      - uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}

          subject: "Manager Approval Required"

          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}

          html_body: |
            <h3>Production Approval Needed</h3>
            <pre>${{ needs.build.outputs.resolved_issues }}</pre>

# -------------------------------------------------------
# 6️⃣ MANAGER APPROVAL
# -------------------------------------------------------
  manager-approval:
    if: github.event.inputs.environment == 'cloud-prod'
    needs: manager-mail
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - run: echo "Waiting for Manager Approval"

# -------------------------------------------------------
# 7️⃣ DEPLOY TO GCS
# -------------------------------------------------------
  deploy:
    needs:
      - build
      - lead-approval
      - manager-approval
    if: always() && (github.event.inputs.environment == 'cloud-dev' || needs.lead-approval.result == 'success')
    runs-on: ubuntu-latest

    outputs:
      url: ${{ steps.url.outputs.url }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.zip_name }}

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Upload ZIP
        run: |
          ENV=${{ github.event.inputs.environment }}
          gsutil cp ${{ needs.build.outputs.zip_name }} gs://${{ env.BUCKET_NAME }}/$ENV/

      - name: Keep Last 5 Builds
        run: |
          ENV=${{ github.event.inputs.environment }}
          FILES=$(gsutil ls gs://${{ env.BUCKET_NAME }}/$ENV/ | sort -r)
          COUNT=0
          for f in $FILES; do
            COUNT=$((COUNT+1))
            if [ $COUNT -gt 5 ]; then gsutil rm $f; fi
          done

      - name: Extract
        run: |
          unzip ${{ needs.build.outputs.zip_name }} -d deploy
          gsutil -m rsync -r -d deploy gs://${{ env.BUCKET_NAME }}/$ENV/app/

      - name: Set Website
        run: |
          gsutil web set -m index.html -e index.html gs://${{ env.BUCKET_NAME }}

      - id: url
        run: |
          ENV=${{ github.event.inputs.environment }}
          echo "url=https://storage.googleapis.com/${{ env.BUCKET_NAME }}/$ENV/app/index.html" >> $GITHUB_OUTPUT

# -------------------------------------------------------
# 8️⃣ SUCCESS MAIL
# -------------------------------------------------------
  success-mail:
    needs: [deploy, build]
    runs-on: ubuntu-latest

    steps:
      - uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}

          subject: "Deployment Successful"

          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}

          html_body: |
            <h2>Deployment Successful</h2>
            <a href="${{ needs.deploy.outputs.url }}">Open App</a>

# -------------------------------------------------------
# 9️⃣ FAILURE MAIL
# -------------------------------------------------------
  failure-mail:
    if: failure()
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}

          subject: "Deployment Failed"

          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}

          html_body: |
            <h2>Deployment Failed</h2>
            <p>Check GitHub Actions logs.</p>