name: WORKING 100% - CI/CD Pipeline (Fixed Angular + GCS + Approvals)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - cloud-dev
          - cloud-test
          - cloud-prod
        default: cloud-prod

env:
  PROJECT_NAME: HospitalManagementSystem
  BUCKET_NAME: claudedeployapp
  NODE_VERSION: 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LEAD_EMAIL: ${{ secrets.LEAD_EMAIL }}
  LEAD_NAME: ${{ secrets.LEAD_NAME }}
  MANAGER_EMAIL: ${{ secrets.MANAGER_EMAIL }}
  MANAGER_NAME: ${{ secrets.MANAGER_NAME }}
  TEAM_CC: ${{ secrets.TEAM_CC }}

permissions:
  contents: read
  id-token: write

jobs:
# -------------------------------------------------------
# JOB 1 - SET ENVIRONMENT + BRANCH
# -------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.set.outputs.branch }}
    steps:
      - id: set
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [[ "$ENV" == "cloud-dev" ]]; then
            echo "branch=dev" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "cloud-test" ]]; then
            echo "branch=test" >> $GITHUB_OUTPUT
          else
            echo "branch=main" >> $GITHUB_OUTPUT
          fi
    
# -------------------------------------------------------
# JOB 2 - BUILD + PACKAGE (FIXED)
# -------------------------------------------------------
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: setup

    outputs:
      zip_name: ${{ steps.zip.outputs.zip_name }}
      ref: ${{ needs.setup.outputs.branch }}
      changed_files: ${{ steps.diff.outputs.changed_files }}
      commit_message: ${{ steps.commit.outputs.commit_message }}
      code_changes: ${{ steps.patch.outputs.code_changes }}
      change_stats: ${{ steps.stats.outputs.change_stats }}
      resolved_issues: ${{ steps.issues.outputs.resolved_issues }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.setup.outputs.branch }}
          fetch-depth: 0
          
# -------------------------------------------------
# JOB 3 - NODE SETUP
# -------------------------------------------------
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

# -------------------------------------------------
# JOB 4 - INSTALL DEPS
# -------------------------------------------------
      - name: Install deps
        run: npm ci --legacy-peer-deps

# -------------------------------------------------
# JOB 5 - BUILD
# -------------------------------------------------
      - name: Map Environment to Angular Config
        id: envmap
        run: |
          ENV="${{ github.event.inputs.environment }}"

          if [[ "$ENV" == "cloud-dev" ]]; then
            echo "cfg=development" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "cloud-test" ]]; then
            echo "cfg=staging" >> $GITHUB_OUTPUT
          else
            echo "cfg=production" >> $GITHUB_OUTPUT
          fi
   
      - name: Build Angular
        run: npm run build -- --configuration=${{ steps.envmap.outputs.cfg }}

# -------------------------------------------------
# JOB 6 - DEBUG
# -------------------------------------------------
      - name: Debug dist
        run: |
          echo "==== DIST ===="
          ls -R dist || true

# -------------------------------------------------
# JOB 7 - VERSION, COMMIT, DIFF, STATS, ISSUES
# -------------------------------------------------

      - name: Generate Version (WITH v PREFIX)
        id: version
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Read Commit Message
        id: commit
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%B || echo "No commit message")
          echo "commit_message=$MSG" >> $GITHUB_OUTPUT

      - name: Detect Changed Files
        id: diff
        shell: bash
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | tr '\n' ', ')
          echo "changed_files=${FILES:-No files changed}" >> $GITHUB_OUTPUT

      - name: Change Statistics
        id: stats
        shell: bash
        run: |
          STATS=$(git diff --stat HEAD~1 HEAD 2>/dev/null | tr '\n' ' ')
          echo "change_stats=${STATS:-No stats available}" >> $GITHUB_OUTPUT
      
      - name: Code Changes Preview
        id: patch
        run: |
          echo "code_changes=Source code updated and ready for deployment." >> $GITHUB_OUTPUT

      - name: Fixed GitHub Issues (CURRENT COMMIT ONLY)
        id: issues
        uses: actions/github-script@v8
        with:
          script: |
            const { execSync } = require('child_process');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // ✅ Get ONLY latest commit message
            let commitMsg = "";
            try {
              commitMsg = execSync("git log -1 --pretty=%B").toString();
            } catch (e) {
              commitMsg = "";
            }

            // ✅ Extract issue numbers like #123
            const matches = [...commitMsg.matchAll(/#(\d+)/g)];
            const uniqueIssues = [...new Set(matches.map(m => m[1]))];

            if (uniqueIssues.length === 0) {
              core.setOutput("resolved_issues", "No issues referenced in this commit.");
              return;
            }

            let output = "Resolved Issues (Current Commit):\n\n";

            for (const issueNumber of uniqueIssues) {
              try {
                const issue = await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number: parseInt(issueNumber)
                });

                output += `• #${issueNumber} - ${issue.data.title}\n`;
              } catch {
                output += `• #${issueNumber} - Issue title unavailable\n`;
              }
            }

            core.setOutput("resolved_issues", output);

# -------------------------------------------------
# JOB 8 - CREATE ZIP (FIXED)
# -------------------------------------------------
      - id: zip
        name: Create ZIP
        run: |
          set -e

          mkdir -p release

          echo "==== DIST CONTENT ===="
          ls -R dist || true

          DIST_DIR=$(find dist -mindepth 1 -maxdepth 1 -type d | head -n 1)

          if [ -z "$DIST_DIR" ]; then
            echo "❌ No dist folder found"
            exit 1
          fi

          echo "Using DIST: $DIST_DIR"

          BROWSER_DIR=$(find "$DIST_DIR" -type d -name browser | head -n 1)

          if [ -n "$BROWSER_DIR" ]; then
            cp -r "$BROWSER_DIR"/* release/
          else
            cp -r "$DIST_DIR"/* release/
          fi

          if [ ! -f "release/index.html" ]; then
            echo "❌ index.html missing"
            exit 1
          fi

          ENV="${{ github.event.inputs.environment }}"
          TS=$(date +%Y%m%d_%H%M%S)
          VERSION="v1.0.0.${{ github.run_number }}"

          ZIP="build_${ENV}_${TS}_${VERSION}.zip"

          zip -r "$ZIP" release

          echo "zip_name=$ZIP" >> $GITHUB_OUTPUT

      - name: Verify ZIP exists
        run: |
          echo "ZIP FILE: ${{ steps.zip.outputs.zip_name }}"
          ls -lh

# -------------------------------------------------
# JOB 9 - UPLOAD ARTIFACT
# -------------------------------------------------
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.zip_name }}
          path: ${{ steps.zip.outputs.zip_name }}
          retention-days: 1

# -------------------------------------------------
# JOB 10 - LEAD APPROVAL EMAIL
# -------------------------------------------------
  lead-mail:
    name: Send Lead Approval Mail
    needs: build
    if: github.event.inputs.environment != 'cloud-dev'
    runs-on: ubuntu-latest

    steps:
      - name: Send Lead Mail
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Lead Approval Required | ${{ github.repository }}
          to: ${{ env.LEAD_EMAIL }}
          cc: ${{ env.TEAM_CC }}
          from: ${{ secrets.SMTP_USERNAME }}
          html_body: |
            <html>
            <body style="font-family:Arial,Helvetica,sans-serif;color:#333;line-height:1.6;">
              <p>Dear <b>${{ env.LEAD_NAME }}</b>,</p>
              <p>Latest build for <b>${{ github.repository }}</b> completed successfully and is ready for your approval.</p>

              <h3 style="color:#0d6efd;">Build Summary</h3>
              <table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse;width:100%;">
                <tr><td><b>Repository</b></td><td>${{ github.repository }}</td></tr>
                <tr><td><b>Branch</b></td><td>${{ needs.build.outputs.ref }}</td></tr>
                <tr><td><b>Status</b></td><td style="color:green;"><b>SUCCESS</b></td></tr>
                <tr><td><b>Triggered By</b></td><td>${{ github.actor }}</td></tr>
                <tr><td><b>Commit ID</b></td><td>${{ github.sha }}</td></tr>
                <tr><td><b>Commit Message</b></td><td>${{ needs.build.outputs.commit_message }}</td></tr>
                <tr><td><b>Environment</b></td><td>${{ github.event.inputs.environment }}</td></tr>
              </table>

              <h3 style="color:#dc3545;margin-top:25px;">Resolved Issues Included in Release</h3>
              <pre style="background:#f8f9fa;padding:16px;border:1px solid #dee2e6;white-space:pre-wrap;">${{ needs.build.outputs.resolved_issues }}</pre>

              <br>

              <h3 style="color:#0d6efd;">Files Changed</h3>
              <p style="background:#f4f4f4;padding:12px;border:1px solid #ddd;">${{ needs.build.outputs.changed_files }}</p>

              <h3 style="color:#0d6efd;">Change Statistics</h3>
              <pre style="background:#f8f9fa;padding:12px;border:1px solid #ddd;">${{ needs.build.outputs.change_stats }}</pre>

              <h3 style="color:#0d6efd;">Approval Steps</h3>
              <ol>
                <li>Open GitHub Repository</li>
                <li>Go to Actions</li>
                <li>Open latest workflow run</li>
                <li>Click Review Deployments</li>
                <li>Approve and Deploy</li>
              </ol>

              <p>Regards,<br><b>DevOps Automation Team</b></p>
            </body>
            </html>

# -------------------------------------------------------
# JOB 11 - LEAD APPROVAL (gate)
# -------------------------------------------------------
  lead-approval:
    needs: build
    if: github.event.inputs.environment != 'cloud-dev'
    runs-on: ubuntu-latest
    environment:
      name: lead-approval
    steps:
      - run: echo "Waiting for Lead Approval"

# -------------------------------------------------
# JOB 12 - MANAGER EMAIL AFTER LEAD APPROVAL
# -------------------------------------------------
  approval-mail:
    name: Send Manager Approval Mail
    needs:
      - lead-approval
      - build
    if: github.event.inputs.environment == 'cloud-prod'
    runs-on: ubuntu-latest

    steps:
      - name: Send Manager Mail
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Manager Approval Required | Production Deployment | ${{ github.repository }}
          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}
          html_body: |
            <html>
            <body style="font-family:Arial,Helvetica,sans-serif;color:#333;line-height:1.6;">
              <p>Dear <b>${{ env.MANAGER_NAME }}</b>,</p>
              <p>A new production build has completed successfully and is now waiting for your approval.</p>

              <h3 style="color:#0d6efd;">Deployment Summary</h3>
              <table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse;width:100%;">
                <tr><td><b>Repository</b></td><td>${{ github.repository }}</td></tr>
                <tr><td><b>Branch</b></td><td>${{ needs.build.outputs.ref }}</td></tr>
                <tr><td><b>Status</b></td><td style="color:green;"><b>SUCCESS</b></td></tr>
                <tr><td><b>Triggered By</b></td><td>${{ github.actor }}</td></tr>
                <tr><td><b>Commit ID</b></td><td>${{ github.sha }}</td></tr>
                <tr><td><b>Commit Message</b></td><td>${{ needs.build.outputs.commit_message }}</td></tr>
                <tr><td><b>Environment</b></td><td>${{ github.event.inputs.environment }}</td></tr>
              </table>

              <h3 style="color:#dc3545;margin-top:25px;">Resolved Issues Included in Release</h3>
              <pre style="background:#f8f9fa;padding:16px;border:1px solid #dee2e6;white-space:pre-wrap;">${{ needs.build.outputs.resolved_issues }}</pre>

              <h3 style="color:#0d6efd;margin-top:25px;">Approval Steps</h3>
              <ol style="line-height:1.8;">
                <li>Open GitHub Repository</li>
                <li>Go to Actions</li>
                <li>Open latest workflow run</li>
                <li>Click Review Deployments</li>
                <li>Approve Production Deployment</li>
              </ol>

              <p style="margin-top:25px;">Deployment will begin automatically immediately after approval.</p>
              <p style="margin-top:30px;">Regards,<br><b>DevOps Automation Team</b></p>
            </body>
            </html>

# -------------------------------------------------------
# JOB 13 - MANAGER APPROVAL (gate)
# -------------------------------------------------------
  approval:
    needs: lead-approval
    if: github.event.inputs.environment == 'cloud-prod'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - run: echo "Waiting for Manager Approval"

# -------------------------------------------------------
# JOB 14 - DEPLOY NON PROD (FIXED)
# -------------------------------------------------------
  deploy-nonprod:
    outputs:
      url: ${{ steps.set_url.outputs.url }}
    needs: [build, lead-approval]
    if: |
      always() &&
      (
       github.event.inputs.environment == 'cloud-dev' ||
       (
        github.event.inputs.environment == 'cloud-test' &&
        needs.lead-approval.result == 'success'
       )
      )

    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.zip_name }}

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Upload ZIP to GCS
        run: |
          ENV=${{ github.event.inputs.environment }}
          ZIP=${{ needs.build.outputs.zip_name }}

          echo "Uploading ZIP to artifacts/$ENV/"
          gsutil cp "$ZIP" gs://$BUCKET_NAME/artifacts/$ENV/$ZIP

      - name: Extract ZIP
        run: |
          unzip "${{ needs.build.outputs.zip_name }}"
          mv release deploy

      - name: Deploy App to GCS (NON-PROD DEV/TEST)
        run: |
          ENV=${{ github.event.inputs.environment }}
          gsutil -m rsync -r -d deploy gs://$BUCKET_NAME/$ENV/

      - name: Cleanup old ZIPs(RETENTION POLICY - KEEP LAST 5 ZIPs ONLY)
        run: |
          ENV=${{ github.event.inputs.environment }}

          FILES=$(gsutil ls -l gs://$BUCKET_NAME/artifacts/$ENV/ \
            | grep '\.zip$' \
            | sort -k2 -r \
            | awk '{print $3}')

          COUNT=0
          for FILE in $FILES; do
            COUNT=$((COUNT+1))
            if [ $COUNT -gt 5 ]; then
              echo "Deleting $FILE"
              gsutil rm "$FILE"
            fi
          done

      - name: Set Website
        run: |
          gsutil web set -m index.html -e index.html gs://$BUCKET_NAME || true

      - name: Set Deployment URL
        id: set_url
        run: |
          ENV=${{ github.event.inputs.environment }}
          URL="https://storage.googleapis.com/${{ env.BUCKET_NAME }}/${ENV}/index.html"
          echo "url=$URL" >> $GITHUB_OUTPUT

# -------------------------------------------------------
# JOB 15 - DEPLOY PROD (FIXED)
# -------------------------------------------------------
  deploy-prod:
    outputs:
      url: ${{ steps.set_url.outputs.url }}
    needs: [approval, build]
    if: github.event.inputs.environment == 'cloud-prod'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.zip_name }}

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Upload ZIP to GCS
        run: |
          ENV=${{ github.event.inputs.environment }}
          ZIP=${{ needs.build.outputs.zip_name }}

          echo "Uploading ZIP to artifacts/$ENV/"
          gsutil cp "$ZIP" gs://$BUCKET_NAME/artifacts/$ENV/$ZIP

      - name: Extract ZIP
        run: |
          unzip "${{ needs.build.outputs.zip_name }}"
          mv release deploy

      - name: Deploy App to GCS (PROD)
        run: |
          ENV=${{ github.event.inputs.environment }}
          gsutil -m rsync -r -d deploy gs://$BUCKET_NAME/$ENV/

      - name: Cleanup old ZIPs(RETENTION POLICY - KEEP LAST 5 ZIPs ONLY)
        run: |
          ENV=${{ github.event.inputs.environment }}

          FILES=$(gsutil ls -l gs://$BUCKET_NAME/artifacts/$ENV/ | sort -k2 -r | awk '{print $3}')

          COUNT=0
          for FILE in $FILES; do
           COUNT=$((COUNT+1))
           if [ $COUNT -gt 5 ]; then
            gsutil rm "$FILE"
           fi
          done

      - name: Set Website
        run: |
          gsutil web set -m index.html -e index.html gs://$BUCKET_NAME || true

      - name: Set Deployment URL
        id: set_url
        run: |
          ENV=${{ github.event.inputs.environment }}
          URL="https://storage.googleapis.com/${{ env.BUCKET_NAME }}/${ENV}/index.html"
          echo "url=$URL" >> $GITHUB_OUTPUT


# -------------------------------------------------
# JOB 16 - SUCCESS MAIL
# -------------------------------------------------
  success-mail:
    name: Send Deployment Success Mail
    needs:
      - deploy-prod
      - deploy-nonprod
      - build
    if: always() && (needs.deploy-prod.result == 'success' || needs.deploy-nonprod.result == 'success')
    runs-on: ubuntu-latest

    env:
      DEPLOY_URL: ${{ needs.deploy-prod.outputs.url || needs.deploy-nonprod.outputs.url }}

    steps:
      - name: Send Success Mail
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Production Deployment Successful | ${{ github.repository }}
          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}
          html_body: |
            <html>
            <body style="font-family:Arial,Helvetica,sans-serif;color:#333;line-height:1.6;">
              <h2 style="color:#198754;">Production Deployment Successful</h2>
              <p>Dear <b>${{ env.MANAGER_NAME }}</b>,</p>
              <p>Approved deployment has completed successfully.</p>

              <table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse;width:100%;">
                <tr><td><b>Repository</b></td><td>${{ github.repository }}</td></tr>
                <tr><td><b>Branch</b></td><td>${{ needs.build.outputs.ref }}</td></tr>
                <tr><td><b>Status</b></td><td style="color:green;"><b>SUCCESS</b></td></tr>
                <tr><td><b>Triggered By</b></td><td>${{ github.actor }}</td></tr>
                <tr><td><b>Commit ID</b></td><td>${{ github.sha }}</td></tr>
                <tr><td><b>Commit Message</b></td><td>${{ needs.build.outputs.commit_message }}</td></tr>
                <tr><td><b>Environment</b></td><td>${{ github.event.inputs.environment }}</td></tr>
              </table>

              <h3 style="color:#198754;margin-top:25px;">Resolved Issues</h3>
              <pre style="background:#f8f9fa;padding:16px;border:1px solid #dee2e6;white-space:pre-wrap;">${{ needs.build.outputs.resolved_issues }}</pre>

              <p>Production environment is now live.</p>

              <h3 style="color:#0d6efd;margin-top:25px;">Live Application</h3>
              <p>
                <a href="${{ env.DEPLOY_URL }}" 
                  style="background:#0d6efd;color:white;padding:12px 18px;text-decoration:none;border-radius:6px;font-weight:bold;">
                  Open Live Application
                </a>
              </p>

              <p><b>URL:</b> ${{ env.DEPLOY_URL }}</p>

              <p>Regards,<br><b>DevOps Automation Team</b></p>
            </body>
            </html>

# -------------------------------------------------
# JOB 17 - FAILURE MAIL
# -------------------------------------------------
  failure-mail:
    name: Send Deployment Failure Mail
    if: always() && failure()
    needs:
      - deploy-prod
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Send Failure Mail
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Production Deployment Failed | ${{ github.repository }}
          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}
          html_body: |
            <html>
            <body style="font-family:Arial,Helvetica,sans-serif;color:#333;line-height:1.6;">
              <h2 style="color:#dc3545;">Deployment Failed</h2>
              <p>Dear <b>${{ env.MANAGER_NAME }}</b>,</p>
              <p>The production deployment for <b>${{ github.repository }}</b> has failed. Please review the GitHub Actions logs.</p>

              <table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse;width:100%;">
                <tr><td><b>Repository</b></td><td>${{ github.repository }}</td></tr>
                <tr><td><b>Branch</b></td><td>${{ needs.build.outputs.ref }}</td></tr>
                <tr><td><b>Triggered By</b></td><td>${{ github.actor }}</td></tr>
                <tr><td><b>Commit ID</b></td><td>${{ github.sha }}</td></tr>
                <tr><td><b>Run URL</b></td>
                  <td><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Logs</a></td>
                </tr>
              </table>

              <h3 style="color:#198754;margin-top:25px;">Issues In This Build</h3>
              <pre style="background:#f8f9fa;padding:16px;border:1px solid #dee2e6;white-space:pre-wrap;">${{ needs.build.outputs.resolved_issues }}</pre>

              <p>Regards,<br><b>DevOps Automation Team</b></p>
            </body>
            </html>