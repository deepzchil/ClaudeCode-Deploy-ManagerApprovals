name: 🚀 HospitalManagementSystem - Production CI/CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - cloud-dev
          - cloud-test
          - cloud-prod
      version:
        description: "Release Version"
        required: true
        default: "v1.0.0.1"

env:
  PROJECT_NAME: HospitalManagementSystem
  BUCKET_NAME: claudedeployapp

# =========================
# 1️⃣ RESOLVE ENVIRONMENT
# =========================
jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.out.outputs.branch }}
      folder: ${{ steps.out.outputs.folder }}
      url: ${{ steps.out.outputs.url }}

    steps:
      - id: out
        run: |
          case "${{ github.event.inputs.environment }}" in

            cloud-dev)
              echo "branch=dev" >> $GITHUB_OUTPUT
              echo "folder=cloud-dev" >> $GITHUB_OUTPUT
              echo "url=https://dev.hospitalmanagementsystem.com" >> $GITHUB_OUTPUT
              ;;

            cloud-test)
              echo "branch=test" >> $GITHUB_OUTPUT
              echo "folder=cloud-test" >> $GITHUB_OUTPUT
              echo "url=https://test.hospitalmanagementsystem.com" >> $GITHUB_OUTPUT
              ;;

            cloud-prod)
              echo "branch=main" >> $GITHUB_OUTPUT
              echo "folder=cloud-prod" >> $GITHUB_OUTPUT
              echo "url=https://hospitalmanagementsystem.com" >> $GITHUB_OUTPUT
              ;;
          esac

# =========================
# 2️⃣ BUILD ANGULAR APP
# =========================
  build:
    needs: resolve
    runs-on: ubuntu-latest

    outputs:
      artifact_name: ${{ steps.zip.outputs.name }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build -- --configuration production

# =========================
# 3️⃣ CREATE VERSIONED ZIP
# =========================
      - id: zip
        run: |
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          FOLDER=${{ needs.resolve.outputs.folder }}
          VERSION=${{ github.event.inputs.version }}

          ZIP_NAME="build_${FOLDER}_${TIMESTAMP}_${VERSION}.zip"

          cd dist || exit 1
          zip -r ../$ZIP_NAME .

          echo "name=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.name }}
          path: ${{ steps.zip.outputs.name }}

# =========================
# 4️⃣ TEST APPROVAL EMAIL (LEAD)
# =========================
  test-approval:
    needs: [resolve, build]
    if: github.event.inputs.environment == 'cloud-test'
    runs-on: ubuntu-latest

    steps:
      - name: Email Lead for Approval
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "🟡 TEST Deployment Approval Required - HMS"
          to: ${{ secrets.LEAD_EMAIL }}
          from: CI/CD Pipeline
          body: |
            TEST Deployment Request

            Version: ${{ github.event.inputs.version }}
            Branch: test

            Please review and approve for deployment.

# =========================
# 5️⃣ PROD APPROVAL GATE (HARD STOP)
# =========================
  prod-approval:
    needs: [resolve, build]
    if: github.event.inputs.environment == 'cloud-prod'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - run: echo "Waiting for Manager Approval..."

# =========================
# 6️⃣ DEPLOY TO GCP
# =========================
  deploy:
    needs: [resolve, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload ZIP to GCS
        run: |
          gsutil cp *.zip gs://$BUCKET_NAME/${{ needs.resolve.outputs.folder }}/

# =========================
# 7️⃣ RETENTION POLICY (LAST 5 ONLY)
# =========================
      - name: Cleanup Old Builds
        run: |
          FOLDER=${{ needs.resolve.outputs.folder }}

          gsutil ls gs://$BUCKET_NAME/$FOLDER/ \
          | sort -r \
          | tail -n +6 \
          | xargs -r gsutil rm

# =========================
# 8️⃣ EXTRACT & DEPLOY APP
# =========================
      - name: Extract & Sync
        run: |
          mkdir app
          unzip *.zip -d app

          gsutil -m rsync -r app gs://$BUCKET_NAME/${{ needs.resolve.outputs.folder }}/app/

# =========================
# 9️⃣ FINAL NOTIFICATIONS
# =========================
  notify:
    needs: [resolve, deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ Deployment Successful - HMS"
          to: ${{ secrets.MANAGER_EMAIL }}
          from: CI/CD Pipeline
          body: |
            Deployment Successful 🚀

            Environment: ${{ github.event.inputs.environment }}
            URL: ${{ needs.resolve.outputs.url }}

      - name: Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ Deployment Failed - HMS"
          to: ${{ secrets.MANAGER_EMAIL }}
          from: CI/CD Pipeline
          body: |
            Deployment Failed ❌

            Environment: ${{ github.event.inputs.environment }}

            Please check logs for details.