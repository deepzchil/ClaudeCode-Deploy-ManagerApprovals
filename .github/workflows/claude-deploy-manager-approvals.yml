name: Claude - Angular Build & Deploy Pipeline with Approval Gates

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Deployment Environment'
        required: true
        type: choice
        options:
          - cloud-dev
          - cloud-test
          - cloud-prod
      version:
        description: 'Release Version (e.g. v1.0.0.5)'
        required: true
        default: 'v1.0.0.1'
      fix_notes:
        description: 'Fix/Change Notes (used in approval emails)'
        required: true
        default: 'No notes provided'

# ─────────────────────────────────────────────────────────────────────────────
# Environment-level concurrency: one deployment per env at a time
# ─────────────────────────────────────────────────────────────────────────────
concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  GCP_BUCKET: claudedeployapp
  ARTIFACT_RETENTION_DAYS: 3
  MAX_ZIPS_PER_FOLDER: 5
  NODE_VERSION: '20'  # Use Node 20 for Angular 15+ builds

# ═════════════════════════════════════════════════════════════════════════════
# JOB 1 — Resolve environment-specific variables
# ═════════════════════════════════════════════════════════════════════════════
jobs:
  resolve-env:
    name: 🔍 Resolve Environment Config
    runs-on: ubuntu-latest
    outputs:
      branch:        ${{ steps.cfg.outputs.branch }}
      env_label:     ${{ steps.cfg.outputs.env_label }}
      gcp_folder:    ${{ steps.cfg.outputs.gcp_folder }}
      build_config:  ${{ steps.cfg.outputs.build_config }}
      app_url:       ${{ steps.cfg.outputs.app_url }}
      timestamp:     ${{ steps.cfg.outputs.timestamp }}
      artifact_name: ${{ steps.cfg.outputs.artifact_name }}
    steps:
      - name: Compute config
        id: cfg
        run: |
          ENV="${{ github.event.inputs.environment }}"
          VER="${{ github.event.inputs.version }}"
          TS=$(date +"%Y%m%d_%H%M%S")

          case "$ENV" in
            cloud-dev)
              BRANCH="dev"
              LABEL="cloud-dev"
              FOLDER="dev"
              CONFIG="development"
              URL="${{ secrets.DEV_APP_URL }}"
              ;;
            cloud-test)
              BRANCH="test"
              LABEL="cloud-test"
              FOLDER="test"
              CONFIG="staging"
              URL="${{ secrets.TEST_APP_URL }}"
              ;;
            cloud-prod)
              BRANCH="main"
              LABEL="cloud-prod"
              FOLDER="prod"
              CONFIG="production"
              URL="${{ secrets.PROD_APP_URL }}"
              ;;
          esac

          case "$ENV" in
            cloud-dev)
              URL="https://storage.googleapis.com/claudedeployapp/dev/app/index.html"
              ;;
            cloud-test)
              URL="https://storage.googleapis.com/claudedeployapp/test/app/index.html"
              ;;
            cloud-prod)
              URL="https://storage.googleapis.com/claudedeployapp/prod/app/index.html"
              ;;
          esac

          # IMPORTANT: fallback safety check
          if [ -z "$URL" ]; then
            URL="URL_NOT_SET"
          fi

          echo "app_url=$URL" >> $GITHUB_OUTPUT
          echo "DEBUG APP_URL=$URL" >> $GITHUB_OUTPUT

          ARTIFACT="build_${LABEL}_${TS}_${VER}.zip"

          echo "branch=$BRANCH"           >> $GITHUB_OUTPUT
          echo "env_label=$LABEL"         >> $GITHUB_OUTPUT
          echo "gcp_folder=$FOLDER"       >> $GITHUB_OUTPUT
          echo "build_config=$CONFIG"     >> $GITHUB_OUTPUT
          echo "app_url=$URL"             >> $GITHUB_OUTPUT
          echo "timestamp=$TS"            >> $GITHUB_OUTPUT
          echo "artifact_name=$ARTIFACT"  >> $GITHUB_OUTPUT

          echo "✅ ENV=$LABEL  BRANCH=$BRANCH  ARTIFACT=$ARTIFACT"
          echo "DEBUG APP_URL=$URL"

# ═════════════════════════════════════════════════════════════════════════════
# JOB 2 — Checkout, Build, Package
# ═════════════════════════════════════════════════════════════════════════════
  build:
    name: 🏗️ Checkout → Build → Package
    runs-on: ubuntu-latest
    needs: resolve-env
    outputs:
      artifact_name: ${{ needs.resolve-env.outputs.artifact_name }}
    steps:
      - name: Checkout ${{ needs.resolve-env.outputs.branch }} branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-env.outputs.branch }}

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular (${{ needs.resolve-env.outputs.build_config }})
        run: |
          npx ng build \
            --configuration=${{ needs.resolve-env.outputs.build_config }} \
            --base-href=/${{ needs.resolve-env.outputs.gcp_folder }}/app/ \
            --deploy-url=/${{ needs.resolve-env.outputs.gcp_folder }}/app/ \
            --output-path=dist/app

      - name: Verify build output
        run: |
          if [ ! -d "dist/app" ] || [ -z "$(ls -A dist/app)" ]; then
            echo "❌ Build output directory is empty or missing!"
            exit 1
          fi
          echo "✅ Build output verified — $(find dist/app -type f | wc -l) files"

      - name: Create artifact ZIP
        run: |
          cd dist
          zip -r "../${{ needs.resolve-env.outputs.artifact_name }}" app/
          echo "📦 Artifact: ${{ needs.resolve-env.outputs.artifact_name }}"
          ls -lh "../${{ needs.resolve-env.outputs.artifact_name }}"

      - name: Upload artifact to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.resolve-env.outputs.artifact_name }}
          path: ${{ needs.resolve-env.outputs.artifact_name }}
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

# ═════════════════════════════════════════════════════════════════════════════
# JOB 3 — TEST approval email (only for cloud-test)
# ═════════════════════════════════════════════════════════════════════════════
  notify-test-approval:
    name: 📧 Request Test Deployment Approval (Lead)
    runs-on: ubuntu-latest
    needs: [resolve-env, build]
    if: ${{ github.event.inputs.environment == 'cloud-test' }}
    steps:
      - name: Send approval request to Lead
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port:    ${{ secrets.SMTP_PORT }}
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          to:             ${{ secrets.LEAD_EMAIL }}
          cc:             ${{ secrets.MANAGER_EMAIL }}
          from:           "HMS CI/CD Pipeline <${{ secrets.SMTP_USERNAME }}>"
          subject:        "[ACTION REQUIRED] Test Deployment Approval — ${{ needs.resolve-env.outputs.artifact_name }}"
          html_body: |
            <html>
            <body style="font-family: 'Segoe UI', Arial, sans-serif; background:#f4f6f9; padding:30px;">
              <div style="max-width:640px; margin:0 auto; background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.08);">
                <div style="background:linear-gradient(135deg,#0f4c81,#1976d2); padding:28px 32px;">
                  <h1 style="color:#fff; margin:0; font-size:22px; letter-spacing:0.3px;">🚀 Test Deployment Approval Required</h1>
                  <p style="color:#bbdefb; margin:6px 0 0; font-size:14px;">Hospital Management System — CI/CD Pipeline</p>
                </div>
                <div style="padding:28px 32px;">
                  <p style="color:#333; font-size:15px; line-height:1.6;">Dear <strong>${{ secrets.LEAD_NAME }}</strong>,</p>
                  <p style="color:#555; font-size:14px; line-height:1.7;">
                    A new build has been successfully completed and is awaiting your approval for deployment to the <strong>Test Environment</strong>.
                    Please review the details below and approve or reject this deployment.
                  </p>

                  <table style="width:100%; border-collapse:collapse; margin:20px 0; font-size:14px;">
                    <tr style="background:#f0f7ff;">
                      <td style="padding:10px 14px; font-weight:600; color:#0f4c81; width:40%; border:1px solid #dce8f5;">Environment</td>
                      <td style="padding:10px 14px; color:#333; border:1px solid #dce8f5;">cloud-test</td>
                    </tr>
                    <tr>
                      <td style="padding:10px 14px; font-weight:600; color:#0f4c81; border:1px solid #dce8f5;">Branch</td>
                      <td style="padding:10px 14px; color:#333; border:1px solid #dce8f5;">test</td>
                    </tr>
                    <tr style="background:#f0f7ff;">
                      <td style="padding:10px 14px; font-weight:600; color:#0f4c81; border:1px solid #dce8f5;">Build Artifact</td>
                      <td style="padding:10px 14px; color:#333; font-family:monospace; border:1px solid #dce8f5;">${{ needs.resolve-env.outputs.artifact_name }}</td>
                    </tr>
                    <tr>
                      <td style="padding:10px 14px; font-weight:600; color:#0f4c81; border:1px solid #dce8f5;">Version</td>
                      <td style="padding:10px 14px; color:#333; border:1px solid #dce8f5;">${{ github.event.inputs.version }}</td>
                    </tr>
                    <tr style="background:#f0f7ff;">
                      <td style="padding:10px 14px; font-weight:600; color:#0f4c81; border:1px solid #dce8f5;">Build Time</td>
                      <td style="padding:10px 14px; color:#333; border:1px solid #dce8f5;">${{ needs.resolve-env.outputs.timestamp }}</td>
                    </tr>
                    <tr>
                      <td style="padding:10px 14px; font-weight:600; color:#0f4c81; border:1px solid #dce8f5;">Triggered By</td>
                      <td style="padding:10px 14px; color:#333; border:1px solid #dce8f5;">${{ github.actor }}</td>
                    </tr>
                  </table>

                  <div style="background:#fff8e1; border-left:4px solid #f59e0b; padding:16px 18px; margin:20px 0; border-radius:0 6px 6px 0;">
                    <p style="margin:0 0 8px; font-weight:700; color:#92400e; font-size:14px;">📋 Changes & Issues Resolved</p>
                    <p style="margin:0; color:#555; font-size:14px; line-height:1.7; white-space:pre-wrap;">${{ github.event.inputs.fix_notes }}</p>
                  </div>

                  <p style="color:#555; font-size:14px;">To approve or reject this deployment, please visit the GitHub Actions workflow:</p>
                  <div style="text-align:center; margin:24px 0;">
                    <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                       style="background:#1976d2; color:#fff; padding:12px 28px; border-radius:6px; text-decoration:none; font-weight:600; font-size:14px; display:inline-block;">
                      🔗 Review &amp; Approve Deployment
                    </a>
                  </div>

                  <p style="color:#888; font-size:12px; border-top:1px solid #eee; padding-top:16px; margin-top:24px;">
                    This is an automated notification from the HMS CI/CD Pipeline.<br>
                    Repository: ${{ github.repository }} | Run ID: ${{ github.run_id }}
                  </p>
                </div>
              </div>
            </body>
            </html>

  await-test-approval:
    name: ⏳ Awaiting Lead Approval (Test)
    runs-on: ubuntu-latest
    needs: [resolve-env, build]
    if: ${{ github.event.inputs.environment == 'cloud-test' }}
    environment:
      name: test-approval   # 👈 THIS IS THE MAGIC
    steps:
      - run: echo "✅ Lead approved test deployment"

      - name: Send FYI email to Manager
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port:    ${{ secrets.SMTP_PORT }}
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          to:             ${{ secrets.MANAGER_EMAIL }}
          from:           "HMS CI/CD Pipeline <${{ secrets.SMTP_USERNAME }}>"
          subject:        "[FYI] Test Build Ready — ${{ needs.resolve-env.outputs.artifact_name }}"
          html_body: |
            <html>
            <body style="font-family: 'Segoe UI', Arial, sans-serif; background:#f4f6f9; padding:30px;">
              <div style="max-width:600px; margin:0 auto; background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.08);">
                <div style="background:linear-gradient(135deg,#0f4c81,#1976d2); padding:24px 28px;">
                  <h1 style="color:#fff; margin:0; font-size:20px;">📌 Test Build Notification</h1>
                  <p style="color:#bbdefb; margin:4px 0 0; font-size:13px;">Hospital Management System — For Your Information</p>
                </div>
                <div style="padding:24px 28px;">
                  <p style="color:#333; font-size:14px; line-height:1.7;">Dear <strong>${{ secrets.MANAGER_NAME }}</strong>,</p>
                  <p style="color:#555; font-size:14px; line-height:1.7;">
                    This is a courtesy notification that a new build (<strong>${{ needs.resolve-env.outputs.artifact_name }}</strong>) has been
                    submitted for test deployment and is currently pending approval from the Lead.
                  </p>
                  <p style="color:#555; font-size:14px;">No action is required from you at this stage.</p>
                  <p style="color:#888; font-size:12px; border-top:1px solid #eee; padding-top:14px; margin-top:20px;">
                    HMS CI/CD Pipeline — Automated Notification | Run: ${{ github.run_id }}
                  </p>
                </div>
              </div>
            </body>
            </html>

# ═════════════════════════════════════════════════════════════════════════════
# JOB 4 — PROD approval gate (only for cloud-prod)
# ═════════════════════════════════════════════════════════════════════════════
  request-prod-approval:
    name: 📧 Request Production Approval (Manager)
    runs-on: ubuntu-latest
    needs: [resolve-env, build]
    if: ${{ github.event.inputs.environment == 'cloud-prod' }}
    steps:
      - name: Send production approval request to Manager
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port:    ${{ secrets.SMTP_PORT }}
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          to:             ${{ secrets.MANAGER_EMAIL }}
          from:           "HMS CI/CD Pipeline <${{ secrets.SMTP_USERNAME }}>"
          subject:        "[APPROVAL REQUIRED] Production Deployment — ${{ needs.resolve-env.outputs.artifact_name }}"
          html_body: |
            <html>
            <body style="font-family: 'Segoe UI', Arial, sans-serif; background:#f4f6f9; padding:30px;">
              <div style="max-width:640px; margin:0 auto; background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.08);">
                <div style="background:linear-gradient(135deg,#7b1fa2,#c62828); padding:28px 32px;">
                  <h1 style="color:#fff; margin:0; font-size:22px; letter-spacing:0.3px;">🔐 Production Deployment Approval</h1>
                  <p style="color:#f8bbd0; margin:6px 0 0; font-size:14px;">Hospital Management System — Action Required</p>
                </div>
                <div style="padding:28px 32px;">
                  <p style="color:#333; font-size:15px; line-height:1.6;">Dear <strong>${{ secrets.MANAGER_NAME }}</strong>,</p>
                  <p style="color:#555; font-size:14px; line-height:1.7;">
                    A production deployment is pending your approval. Please review the build details and the list of resolved issues
                    carefully before approving. <strong>This action will deploy directly to the live production environment.</strong>
                  </p>

                  <table style="width:100%; border-collapse:collapse; margin:20px 0; font-size:14px;">
                    <tr style="background:#fce4ec;">
                      <td style="padding:10px 14px; font-weight:600; color:#880e4f; width:40%; border:1px solid #f8bbd0;">Environment</td>
                      <td style="padding:10px 14px; color:#333; border:1px solid #f8bbd0;">cloud-prod (PRODUCTION)</td>
                    </tr>
                    <tr>
                      <td style="padding:10px 14px; font-weight:600; color:#880e4f; border:1px solid #f8bbd0;">Branch</td>
                      <td style="padding:10px 14px; color:#333; border:1px solid #f8bbd0;">main</td>
                    </tr>
                    <tr style="background:#fce4ec;">
                      <td style="padding:10px 14px; font-weight:600; color:#880e4f; border:1px solid #f8bbd0;">Build Artifact</td>
                      <td style="padding:10px 14px; color:#333; font-family:monospace; border:1px solid #f8bbd0;">${{ needs.resolve-env.outputs.artifact_name }}</td>
                    </tr>
                    <tr>
                      <td style="padding:10px 14px; font-weight:600; color:#880e4f; border:1px solid #f8bbd0;">Version</td>
                      <td style="padding:10px 14px; color:#333; border:1px solid #f8bbd0;">${{ github.event.inputs.version }}</td>
                    </tr>
                    <tr style="background:#fce4ec;">
                      <td style="padding:10px 14px; font-weight:600; color:#880e4f; border:1px solid #f8bbd0;">Build Time</td>
                      <td style="padding:10px 14px; color:#333; border:1px solid #f8bbd0;">${{ needs.resolve-env.outputs.timestamp }}</td>
                    </tr>
                    <tr>
                      <td style="padding:10px 14px; font-weight:600; color:#880e4f; border:1px solid #f8bbd0;">Requested By</td>
                      <td style="padding:10px 14px; color:#333; border:1px solid #f8bbd0;">${{ github.actor }}</td>
                    </tr>
                  </table>

                  <div style="background:#fff8e1; border-left:4px solid #f59e0b; padding:16px 18px; margin:20px 0; border-radius:0 6px 6px 0;">
                    <p style="margin:0 0 8px; font-weight:700; color:#92400e; font-size:14px;">🛠️ Fixes & Issues Resolved in This Release</p>
                    <p style="margin:0; color:#555; font-size:14px; line-height:1.7; white-space:pre-wrap;">${{ github.event.inputs.fix_notes }}</p>
                  </div>

                  <div style="background:#ffebee; border:1px solid #ef9a9a; padding:14px 18px; border-radius:6px; margin:20px 0;">
                    <p style="margin:0; color:#c62828; font-size:13px; font-weight:600;">
                      ⚠️ Approving this will immediately trigger deployment to PRODUCTION.
                      Ensure all test validations are complete before approving.
                    </p>
                  </div>

                  <div style="text-align:center; margin:24px 0;">
                    <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                       style="background:#c62828; color:#fff; padding:13px 32px; border-radius:6px; text-decoration:none; font-weight:700; font-size:14px; display:inline-block; letter-spacing:0.5px;">
                      🔐 Approve / Reject Production Deployment
                    </a>
                  </div>

                  <p style="color:#888; font-size:12px; border-top:1px solid #eee; padding-top:16px; margin-top:24px;">
                    Hospital Management System CI/CD Pipeline — Automated Notification<br>
                    Repository: ${{ github.repository }} | Run ID: ${{ github.run_id }}
                  </p>
                </div>
              </div>
            </body>
            </html>

  # Manual approval gate enforced via GitHub Environments
  await-prod-approval:
    name: ⏳ Awaiting Manager Approval
    runs-on: ubuntu-latest
    needs: request-prod-approval
    environment:
      name: production-approval   # Configure this in repo Settings → Environments with required reviewers
    steps:
      - run: echo "✅ Production deployment approved by manager. Proceeding..."

# ═════════════════════════════════════════════════════════════════════════════
# JOB 5 — GCP Upload + Rotate + Extract + Deploy
# ═════════════════════════════════════════════════════════════════════════════
  deploy:
    name: ☁️ Upload to GCP → Extract → Deploy
    runs-on: ubuntu-latest
    needs: [resolve-env, build, await-test-approval, await-prod-approval]
    # Run if DEV (skips both approval jobs), or after test approval, or after prod approval
    if: |
      always() &&
      needs.build.result == 'success' &&
      (
        github.event.inputs.environment == 'cloud-dev' ||
        (github.event.inputs.environment == 'cloud-test'  && needs.await-test-approval.result == 'success') ||
        (github.event.inputs.environment == 'cloud-prod'  && needs.await-prod-approval.result  == 'success')
      )
    outputs:
      deploy_url: ${{ needs.resolve-env.outputs.app_url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.resolve-env.outputs.artifact_name }}

      - name: Verify artifact downloaded
        run: |
          ls -lh "${{ needs.resolve-env.outputs.artifact_name }}"
          echo "✅ Artifact ready for upload"

      # ── Create GCS folder (object prefix) if it doesn't exist ──────────────
      - name: Ensure GCS folder exists
        run: |
          FOLDER="${{ needs.resolve-env.outputs.gcp_folder }}"
          BUCKET="${{ env.GCP_BUCKET }}"
          # GCS uses object prefixes; create a placeholder only if empty
          COUNT=$(gsutil ls "gs://${BUCKET}/${FOLDER}/" 2>/dev/null | wc -l || echo 0)
          if [ "$COUNT" -eq 0 ]; then
            echo "📁 Folder '${FOLDER}' is new — creating placeholder..."
            echo "Folder exists check skipped (GCS doesn't need folders)"
          else
            echo "📁 Folder '${FOLDER}' already exists."
          fi

      # ── Upload the new ZIP ──────────────────────────────────────────────────
      - name: Upload ZIP to GCS
        run: |
          FOLDER="${{ needs.resolve-env.outputs.gcp_folder }}"
          ARTIFACT="${{ needs.resolve-env.outputs.artifact_name }}"
          gsutil cp "${ARTIFACT}" "gs://${{ env.GCP_BUCKET }}/${FOLDER}/${ARTIFACT}"
          echo "✅ Uploaded: gs://${{ env.GCP_BUCKET }}/${FOLDER}/${ARTIFACT}"

      # ── Enforce max 5 ZIPs per folder ──────────────────────────────────────
      - name: Rotate old ZIPs (keep latest 5)
        run: |
          FOLDER="${{ needs.resolve-env.outputs.gcp_folder }}"
          BUCKET="${{ env.GCP_BUCKET }}"
          MAX=${{ env.MAX_ZIPS_PER_FOLDER }}

          # List all zip files sorted by creation time (oldest first)
          mapfile -t ZIPS < <(gsutil ls -l "gs://${BUCKET}/${FOLDER}/*.zip" 2>/dev/null \
            | grep -v "^TOTAL:" \
            | sort -k2 \
            | awk '{print $3}')

          COUNT=${#ZIPS[@]}
          echo "📦 Found ${COUNT} ZIP(s) in gs://${BUCKET}/${FOLDER}/"

          if [ "$COUNT" -gt "$MAX" ]; then
            DELETE_COUNT=$(( COUNT - MAX ))
            echo "🗑️ Removing ${DELETE_COUNT} oldest ZIP(s) to maintain max ${MAX}..."
            for i in $(seq 0 $(( DELETE_COUNT - 1 ))); do
              echo "  Deleting: ${ZIPS[$i]}"
              gsutil rm "${ZIPS[$i]}"
            done
          else
            echo "✅ Within limit — no rotation needed."
          fi

      # ── Extract ZIP into GCS (serve from bucket) ───────────────────────────
      - name: Extract ZIP and sync static files to GCS
        run: |
          FOLDER="${{ needs.resolve-env.outputs.gcp_folder }}"
          ARTIFACT="${{ needs.resolve-env.outputs.artifact_name }}"
          BUCKET="${{ env.GCP_BUCKET }}"
          EXTRACT_DIR="extracted_app"
          DEPLOY_PREFIX="${FOLDER}/app"

          mkdir -p "${EXTRACT_DIR}"
          unzip -q "${ARTIFACT}" -d "$EXTRACT_DIR"
          echo "📂 Extracted files:"
          find "${EXTRACT_DIR}" -type f | head -20

          # 🔥 Fix Angular SSR issue
          if [ -d "$EXTRACT_DIR/app/browser" ]; then
            SRC="$EXTRACT_DIR/app/browser/"
          else
            SRC="$EXTRACT_DIR/app/"
          fi

          echo "📂 Deploying from: $SRC"

          # Sync to GCS, setting correct cache headers for Angular
          gsutil -m rsync -r -d \
            -x ".*\.gz$" \
            "$SRC" \
            "gs://${BUCKET}/${DEPLOY_PREFIX}/"

          # Set cache-control headers
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=31536000, immutable" \
            "gs://${BUCKET}/${DEPLOY_PREFIX}/**.js" 2>/dev/null || true
          gsutil -m setmeta \
            -h "Cache-Control:no-cache, no-store, must-revalidate" \
            "gs://${BUCKET}/${DEPLOY_PREFIX}/index.html" 2>/dev/null || true

          echo "✅ Application files synced to gs://${BUCKET}/${DEPLOY_PREFIX}/"

      - name: Verify uploaded files
        run: |
          echo "🔍 Verifying uploaded files..."
          gsutil ls -r gs://${{ env.GCP_BUCKET }}/${{ needs.resolve-env.outputs.gcp_folder }}/app/

      # ── Invalidate CDN / update load balancer (if applicable) ──────────────
      - name: Invalidate CDN Cache (if backend bucket configured)
        run: |
          ENV="${{ github.event.inputs.environment }}"
          echo "🔄 CDN invalidation step (configure with your GCP Load Balancer URL map name)"
          # Example — uncomment and set YOUR_URL_MAP:
          # gcloud compute url-maps invalidate-cdn-cache YOUR_URL_MAP \
          #   --path "/*" \
          #   --global \
          #   --async
          echo "ℹ️ Skipped — configure GCP URL map name in workflow if CDN is in use."

# ═════════════════════════════════════════════════════════════════════════════
# JOB 6 — Post-Deployment Success Notification (PROD only)
# ═════════════════════════════════════════════════════════════════════════════
  notify-prod-success:
    name: 📧 Notify Manager — Production Success
    runs-on: ubuntu-latest
    needs: [resolve-env, deploy]
    if: |
      always() &&
      github.event.inputs.environment == 'cloud-prod' &&
      needs.deploy.result == 'success'
    steps:
      - name: Format fix_notes into bullet list
        id: format_notes
        run: |
          NOTES="${{ github.event.inputs.fix_notes }}"

          FORMATTED=$(echo "$NOTES" \
            | sed 's/[0-9]\+\.//g' \
            | tr ';' '\n' \
            | sed '/^$/d' \
            | sed 's/^ *//;s/ *$//' \
            | sed 's/.*/<li style="margin-bottom:6px;">&<\/li>/')

          echo "formatted_notes<<EOF" >> $GITHUB_OUTPUT
          echo "$FORMATTED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send success email to Manager
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port:    ${{ secrets.SMTP_PORT }}
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          to:             ${{ secrets.MANAGER_EMAIL }}
          from:           "HMS CI/CD Pipeline <${{ secrets.SMTP_USERNAME }}>"
          subject:        "✅ [SUCCESS] Production Deployment Live — ${{ needs.resolve-env.outputs.artifact_name }}"
          html_body: |
            <html>
            <body style="font-family: 'Segoe UI', Arial, sans-serif; background:#f4f6f9; padding:30px;">
              <div style="max-width:620px; margin:0 auto; background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.08);">
                <div style="background:linear-gradient(135deg,#1b5e20,#2e7d32); padding:28px 32px;">
                  <h1 style="color:#fff; margin:0; font-size:22px;">✅ Production Deployment Successful</h1>
                  <p style="color:#a5d6a7; margin:6px 0 0; font-size:14px;">Hospital Management System is now LIVE</p>
                </div>
                <div style="padding:28px 32px;">
                  <p style="color:#333; font-size:15px;">Dear <strong>${{ secrets.MANAGER_NAME }}</strong>,</p>
                  <p style="color:#555; font-size:14px; line-height:1.7;">
                    The production deployment has completed successfully. The application is now live and accessible at:
                  </p>

                  <div style="text-align:center; margin:24px 0;">
                    <a href="${{ needs.resolve-env.outputs.app_url }}"
                       style="background:#2e7d32; color:#fff; padding:13px 36px; border-radius:6px; text-decoration:none; font-weight:700; font-size:15px; display:inline-block; letter-spacing:0.5px;">
                      🌐 ${{ needs.resolve-env.outputs.app_url }}
                    </a>
                  </div>

                  <table style="width:100%; border-collapse:collapse; font-size:14px; margin:20px 0;">
                    <tr style="background:#e8f5e9;">
                      <td style="padding:10px 14px; font-weight:600; color:#1b5e20; width:40%; border:1px solid #c8e6c9;">Artifact</td>
                      <td style="padding:10px 14px; font-family:monospace; border:1px solid #c8e6c9;">${{ needs.resolve-env.outputs.artifact_name }}</td>
                    </tr>
                    <tr>
                      <td style="padding:10px 14px; font-weight:600; color:#1b5e20; border:1px solid #c8e6c9;">Version</td>
                      <td style="padding:10px 14px; border:1px solid #c8e6c9;">${{ github.event.inputs.version }}</td>
                    </tr>
                    <tr style="background:#e8f5e9;">
                      <td style="padding:10px 14px; font-weight:600; color:#1b5e20; border:1px solid #c8e6c9;">
                        Application URL
                      </td>
                      <td style="padding:10px 14px; border:1px solid #c8e6c9;">
                        <a href="${{ needs.resolve-env.outputs.app_url }}" style="color:#2e7d32; font-weight:700;">
                          ${{ needs.resolve-env.outputs.app_url }}
                        </a>
                      </td>
                    </tr>

                    <tr style="background:#e8f5e9;">
                      <td style="padding:10px 14px; font-weight:600; color:#1b5e20; border:1px solid #c8e6c9;">Deployed At</td>
                      <td style="padding:10px 14px; border:1px solid #c8e6c9;">${{ needs.resolve-env.outputs.timestamp }}</td>
                    </tr>
                    <tr>
                      <td style="padding:10px 14px; font-weight:600; color:#1b5e20; border:1px solid #c8e6c9;">Deployed By</td>
                      <td style="padding:10px 14px; border:1px solid #c8e6c9;">${{ github.actor }}</td>
                    </tr>
                  </table>

                  <div style="margin-top:16px;">
                    <p style="margin:0 0 10px; font-weight:700; color:#1b5e20; font-size:14px;">
                      🛠️ Issues Fixed / Changes in This Release
                    </p>

                    <ul style="margin:0; padding-left:20px; color:#333; font-size:14px; line-height:1.8;">
                      ${{ steps.format_notes.outputs.formatted_notes }}
                    </ul>
                  </div>

                  <p style="color:#888; font-size:12px; border-top:1px solid #eee; padding-top:16px;">
                    HMS CI/CD Pipeline — Automated Notification | Run: ${{ github.run_id }}
                  </p>
                </div>
              </div>
            </body>
            </html>

# ═════════════════════════════════════════════════════════════════════════════
# JOB 7 — Post-Deployment Failure Notification (PROD only)
# ═════════════════════════════════════════════════════════════════════════════
  notify-prod-failure:
    name: 📧 Notify Manager — Production Failure
    runs-on: ubuntu-latest
    needs: [resolve-env, deploy]
    if: |
      always() &&
      github.event.inputs.environment == 'cloud-prod' &&
      needs.deploy.result == 'failure'
    steps:
      - name: Send failure email to Manager
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port:    ${{ secrets.SMTP_PORT }}
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          to:             ${{ secrets.MANAGER_EMAIL }}
          from:           "HMS CI/CD Pipeline <${{ secrets.SMTP_USERNAME }}>"
          subject:        "❌ [FAILED] Production Deployment Failed — ${{ needs.resolve-env.outputs.artifact_name }}"
          html_body: |
            <html>
            <body style="font-family: 'Segoe UI', Arial, sans-serif; background:#f4f6f9; padding:30px;">
              <div style="max-width:620px; margin:0 auto; background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.08);">
                <div style="background:linear-gradient(135deg,#b71c1c,#c62828); padding:28px 32px;">
                  <h1 style="color:#fff; margin:0; font-size:22px;">❌ Production Deployment Failed</h1>
                  <p style="color:#ffcdd2; margin:6px 0 0; font-size:14px;">Hospital Management System — Immediate Attention Required</p>
                </div>
                <div style="padding:28px 32px;">
                  <p style="color:#333; font-size:15px;">Dear <strong>${{ secrets.MANAGER_NAME }}</strong>,</p>
                  <p style="color:#555; font-size:14px; line-height:1.7;">
                    The production deployment has <strong>FAILED</strong>. The previous version remains live. Please review the failure details and take corrective action.
                  </p>

                  <div style="background:#ffebee; border-left:4px solid #c62828; padding:14px 18px; margin:20px 0; border-radius:0 6px 6px 0;">
                    <p style="margin:0 0 6px; font-weight:700; color:#b71c1c; font-size:14px;">🔴 Failure Points</p>
                    <p style="margin:0; color:#555; font-size:14px; line-height:1.7;">
                      The deployment job failed. Please check the full logs for detailed error information.
                    </p>
                  </div>

                  <table style="width:100%; border-collapse:collapse; font-size:14px; margin:20px 0;">
                    <tr style="background:#ffebee;">
                      <td style="padding:10px 14px; font-weight:600; color:#b71c1c; width:40%; border:1px solid #ffcdd2;">Failed Artifact</td>
                      <td style="padding:10px 14px; font-family:monospace; border:1px solid #ffcdd2;">${{ needs.resolve-env.outputs.artifact_name }}</td>
                    </tr>
                    <tr>
                      <td style="padding:10px 14px; font-weight:600; color:#b71c1c; border:1px solid #ffcdd2;">Version</td>
                      <td style="padding:10px 14px; border:1px solid #ffcdd2;">${{ github.event.inputs.version }}</td>
                    </tr>
                    <tr style="background:#ffebee;">
                      <td style="padding:10px 14px; font-weight:600; color:#b71c1c; border:1px solid #ffcdd2;">Run ID</td>
                      <td style="padding:10px 14px; border:1px solid #ffcdd2;">${{ github.run_id }}</td>
                    </tr>
                    <tr>
                      <td style="padding:10px 14px; font-weight:600; color:#b71c1c; border:1px solid #ffcdd2;">Triggered By</td>
                      <td style="padding:10px 14px; border:1px solid #ffcdd2;">${{ github.actor }}</td>
                    </tr>
                  </table>

                  <div style="text-align:center; margin:24px 0;">
                    <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                       style="background:#c62828; color:#fff; padding:12px 28px; border-radius:6px; text-decoration:none; font-weight:700; font-size:14px; display:inline-block;">
                      🔍 View Failure Logs
                    </a>
                  </div>

                  <p style="color:#888; font-size:12px; border-top:1px solid #eee; padding-top:16px;">
                    HMS CI/CD Pipeline — Automated Notification | Run: ${{ github.run_id }}
                  </p>
                </div>
              </div>
            </body>
            </html>
